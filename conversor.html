<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Conversor de moedas, distâncias e temperaturas em JavaScript — projeto de Yan Lemke.">
  <title>Conversor de Valores — Yan Lemke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="fotos/logo.png">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet" type="text/css" href="mobile.css">
</head>

<body>
  <div id="menu-nav"></div>
	<div>
<main class="conteudo">
  <section class="conteudo-principal">
    <div style="width: 100%; max-width: 750px; margin: 0 auto;">
      <h2 class="titulo-simples">Conversor de Valores</h2>
      <p style="color: rgba(245,245,245,0.7); text-align: center; margin-top: 8px; margin-bottom: 24px;">Conversões de moedas, distâncias e temperaturas.</p>
      <div style="display: flex; flex-direction: column; gap: 16px;">

        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 24px;">
          <div class="hobby-section-title" style="margin-bottom: 16px;">Real → Dólar, Euro e Bitcoin</div>
          <div style="display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex: 1;">
              <label style="color: rgba(245,245,245,0.7); font-size: 12px; display: block; margin-bottom: 6px;">Valor em Reais (R$)</label>
              <input type="number" id="valorMoeda" style="width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 14px; outline: none;">
            </div>
            <button onclick="ConverterMoeda()" style="background: rgba(185,235,210,0.2); border: 1px solid rgba(185,235,210,0.5); color: rgb(185,235,210); border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;">Converter</button>
          </div>
          <p id="valorMoedaConvertido" style="margin-top: 14px; color: #f5f5f5; font-size: 14px; min-height: 20px;"></p>
        </div>

        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 24px;">
          <div class="hobby-section-title" style="margin-bottom: 16px;">Distância km → Anos-luz</div>
          <div style="display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex: 1;">
              <label style="color: rgba(245,245,245,0.7); font-size: 12px; display: block; margin-bottom: 6px;">Distância em Kilômetros</label>
              <input type="number" id="valorDistancia" style="width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 14px; outline: none;">
            </div>
            <button onclick="ConverterDistancia()" style="background: rgba(185,235,210,0.2); border: 1px solid rgba(185,235,210,0.5); color: rgb(185,235,210); border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;">Converter</button>
          </div>
          <p id="valorDistanciaConvertido" style="margin-top: 14px; color: #f5f5f5; font-size: 14px; min-height: 20px;"></p>
        </div>

        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 24px;">
          <div class="hobby-section-title" style="margin-bottom: 16px;">Temperatura Celsius → Fahrenheit e Kelvin</div>
          <div style="display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex: 1;">
              <label style="color: rgba(245,245,245,0.7); font-size: 12px; display: block; margin-bottom: 6px;">Temperatura em °C</label>
              <input type="number" id="valorTemperatura" style="width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 14px; outline: none;">
            </div>
            <button onclick="ConverterTemperatura()" style="background: rgba(185,235,210,0.2); border: 1px solid rgba(185,235,210,0.5); color: rgb(185,235,210); border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;">Converter</button>
          </div>
          <p id="valorTemperaturaConvertido" style="margin-top: 14px; color: #f5f5f5; font-size: 14px; min-height: 20px;"></p>
        </div>

      </div>
      <div style="text-align: center; margin-top: 24px;">
        <a href="desenvolvimento.html" style="color: rgba(185,235,210,0.7); font-size: 13px;">← Voltar para Desenvolvimento</a>
      </div>
    </div>
  </section>
  </main>

  <div id="footer-nav"></div>
</body>
  <script src="footer.js" defer></script>
  <script src="menu.js" defer></script>
  <script src="conversor.js"></script>
