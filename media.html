<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora de média escolar em JavaScript — projeto de Yan Lemke.">
  <title>Calculadora de Média — Yan Lemke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="fotos/logo.png">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet" type="text/css" href="mobile.css">
</head>

<body>
  <div id="menu-nav"></div>
<main class="conteudo">
    <section class="conteudo-principal">
      <div style="width: 100%; max-width: 750px; margin: 0 auto;">
        <h2 class="titulo-simples">Calculadora de Média</h2>
        <p style="color: rgba(245,245,245,0.7); text-align: center; margin-top: 8px; margin-bottom: 24px;">Informe seu nome e as notas de cada bimestre para calcular a média.</p>
        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 32px; max-width: 400px; margin: 0 auto;">
          <div style="margin-bottom: 16px;">
            <label style="color: rgba(245,245,245,0.8); font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px;">Seu Nome</label>
            <input type="text" id="nome" style="width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 14px; outline: none;">
          </div>
          <div style="margin-bottom: 16px;">
            <label style="color: rgba(245,245,245,0.8); font-size: 13px; font-weight: 500; display: block; margin-bottom: 10px;">Notas por Bimestre</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
              <div>
                <label style="color: rgba(245,245,245,0.6); font-size: 12px; display: block; margin-bottom: 4px;">1º Bimestre</label>
                <input type="number" id="nota1" style="width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 14px; outline: none;">
              </div>
              <div>
                <label style="color: rgba(245,245,245,0.6); font-size: 12px; display: block; margin-bottom: 4px;">2º Bimestre</label>
                <input type="number" id="nota2" style="width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 14px; outline: none;">
              </div>
              <div>
                <label style="color: rgba(245,245,245,0.6); font-size: 12px; display: block; margin-bottom: 4px;">3º Bimestre</label>
                <input type="number" id="nota3" style="width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 14px; outline: none;">
              </div>
              <div>
                <label style="color: rgba(245,245,245,0.6); font-size: 12px; display: block; margin-bottom: 4px;">4º Bimestre</label>
                <input type="number" id="nota4" style="width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 10px 12px; color: #f5f5f5; font-size: 14px; outline: none;">
              </div>
            </div>
          </div>
          <button id="btn1" style="width: 100%; background: rgba(185,235,210,0.2); border: 1px solid rgba(185,235,210,0.5); color: rgb(185,235,210); border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;">Calcular Média</button>
          <p id="output1" style="margin-top: 20px; text-align: center; font-size: 16px; font-weight: 600; color: #f5f5f5; min-height: 24px;"></p>
        </div>
        <div style="text-align: center; margin-top: 24px;">
          <a href="desenvolvimento.html" style="color: rgba(185,235,210,0.7); font-size: 13px;">← Voltar para Desenvolvimento</a>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-nav"></div>
  <script src="footer.js" defer></script>
  <script src="menu.js" defer></script>
  <script src="media.js"></script>
</html>
